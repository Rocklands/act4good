  QU'EST-CE QUE CE FICHIER ?
  ══════════════════════════
  Code source complet du prototype Act4Good.

  STRUCTURE DU FICHIER
  ════════════════════
  1. <head>     — Configuration, polices Google Fonts, styles CSS
  2. Libs       — React 18 + ReactDOM intégrés (pas de CDN externe)
  3. Section A  — Composants partagés (icônes, boutons, avatars...)
  4. Section B  — Parcours Bénévole (5 écrans)
  5. Section C  — Parcours Association (4 écrans)
  6. Section D  — Application principale (navigation, phone frame)

  NAVIGATION DANS LE PROTOTYPE
  ════════════════════════════
  • Flèches ← → du clavier
  • Boutons gauche/droite autour du téléphone
  • Swipe tactile (sur écran tactile)
  • Clic sur les points en bas de page
  • Sélecteur "Bénévole / Association" en haut

  PÉRIMÈTRE DES 9 ÉCRANS
  ══════════════════════
  Bénévole :
    1. Accueil         — missions recommandées + score civique (240 pts)
    2. Détail mission  — fiche complète + jauge de places
    3. Confirmation    — animation de validation + points à débloquer
    4. Mes missions    — historique et missions à venir
    5. Mon profil      — score, badges, niveaux, export LinkedIn/PDF
  Association :
    6. Tableau de bord — KPIs + missions actives
    7. Publier mission — formulaire + matching IA (23 profils compatibles)
    8. Valider bénévoles ← SEUL ÉCRAN RÉELLEMENT INTERACTIF
    9. Rapport d'impact — graphiques + export collectivité
-->
<html lang="fr">
<head>
  <!--
    ══════════════════════════════════════════════════════════════════
    SECTION 1 — CONFIGURATION DE LA PAGE
    ══════════════════════════════════════════════════════════════════
  -->

  <!-- Encodage UTF-8 : permet les accents et caractères français -->
  <meta charset="utf-8">

  <!-- Empêche le zoom automatique sur mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Act4Good — POC commenté</title>

  <!--
    Polices Google Fonts (nécessite une connexion internet) :
    • Inter        — police principale du texte
    • Fraunces     — police pour les chiffres et scores
    • JetBrains Mono — police fixe pour les numéros d'écran
    Si hors-ligne, le navigateur utilisera les polices système par défaut.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <style>
    /*
      ══════════════════════════════════════════════════════════════
      SECTION 2 — STYLES CSS
      ══════════════════════════════════════════════════════════════
      Le CSS contrôle toute l'apparence : couleurs, tailles, espacements
      et animations. Organisé en sous-sections commentées.
    */

    /*
      ── Variables de couleur (palette Act4Good) ─────────────────
      Les variables (--nom) permettent de changer une couleur
      en un seul endroit pour la mettre à jour partout.
    */
    :root {
      --ink: #1A1F1C;              /* Texte principal : presque noir */
      --surface: #FAFAF7;          /* Fond de l'écran : blanc cassé */
      --surface-card: #FFFFFF;     /* Fond des cartes : blanc pur */
      --divider: #ECEFEA;          /* Séparateurs fins entre éléments */
      --divider-strong: #DDE2DC;   /* Séparateurs plus marqués */
      --mute: #6B7270;             /* Texte secondaire : gris moyen */

      /* Couleur primaire = vert Act4Good (modifiable via panneau ⚙️) */
      --primary: oklch(0.62 0.14 155);
      --primary-ink: oklch(0.38 0.10 155);   /* Vert foncé pour le texte */
      --primary-tint: oklch(0.95 0.04 155);  /* Vert très clair pour les fonds */

      /* Couleur accent = orange (points, récompenses) */
      --accent: oklch(0.78 0.14 75);
      --accent-ink: oklch(0.48 0.12 65);
      --accent-tint: oklch(0.95 0.045 80);

      /* Style des cartes (modifiable via panneau ⚙️) */
      --card-border: 1px solid var(--divider);
      --card-shadow: none;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body { margin: 0; padding: 0; }

    /*
      ── Fond de page ─────────────────────────────────────────────
      Deux dégradés radiaux très subtils (vert + orange)
      donnent de la profondeur au fond beige.
    */
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(63,139,79,0.07), transparent 60%),
        radial-gradient(900px 500px at 100% 100%, rgba(215,151,87,0.05), transparent 60%),
        #F4F4F0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scène principale : centre tout le prototype à l'écran */
    .a4g-stage {
      min-height: 100vh; padding: 24px 16px 60px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    /* Barre supérieure avec le sélecteur Bénévole/Association */
    .a4g-topbar {
      display: flex; align-items: center; gap: 12px;
      width: 100%; max-width: 600px;
      justify-content: space-between; flex-wrap: wrap;
    }

    /*
      ── Sélecteur de parcours (pill 2 boutons) ──────────────────
      Bascule entre le parcours Bénévole et Association.
    */
    .a4g-segmented {
      display: inline-flex; padding: 4px; background: #fff;
      border: 1px solid var(--divider); border-radius: 999px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .a4g-seg {
      padding: 8px 18px; border-radius: 999px; border: none;
      background: transparent; font-family: 'Inter', system-ui;
      font-size: 13.5px; font-weight: 600; color: var(--mute);
      cursor: pointer; transition: all 200ms ease;
    }
    .a4g-seg.on { background: var(--ink); color: #fff; } /* Bouton actif */

    /*
      ── Enveloppe du téléphone ───────────────────────────────────
      Padding horizontal = espace pour les boutons gauche/droite.
    */
    .a4g-phone-wrap {
      position: relative; display: flex;
      flex-direction: column; align-items: center; padding: 0 64px;
    }

    /*
      ── Simulation iPhone 14 Pro (390×844px) ────────────────────
      L'ombre en couches simule le boîtier physique du téléphone.
    */
    .a4g-phone {
      width: 390px; height: 844px; border-radius: 54px;
      position: relative; background: var(--surface); overflow: hidden;
      box-shadow:
        0 0 0 12px #0E1310,     /* Cadre noir */
        0 0 0 13px #2A312D,     /* Bord métallique */
        0 50px 100px -20px rgba(26,31,28,0.35),
        0 30px 60px -30px rgba(26,31,28,0.4);
    }
    /* Reflet du verre */
    .a4g-bezel {
      position: absolute; inset: 0; border-radius: 54px;
      pointer-events: none;
      box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.4); z-index: 1000;
    }
    /* Barre de statut (heure, batterie) — non interactive */
    .a4g-status {
      position: absolute; top: 0; left: 0; right: 0; height: 50px;
      padding: 18px 26px 0; display: flex;
      align-items: flex-start; justify-content: space-between;
      z-index: 50; pointer-events: none;
    }
    /* Dynamic Island (encoche noire caractéristique de l'iPhone 14 Pro) */
    .a4g-island {
      position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
      width: 122px; height: 36px; background: #000; border-radius: 22px; z-index: 60;
    }
    /* Zone scrollable où chaque écran s'affiche */
    .a4g-screen {
      position: relative; width: 100%; height: 100%;
      overflow-y: auto; overflow-x: hidden; background: var(--surface);
    }
    .a4g-screen::-webkit-scrollbar { display: none; }

    /*
      ── Animations ───────────────────────────────────────────────
      fade-in : apparition à chaque changement d'écran
      pop     : rebond pour la validation d'un bénévole (écran 8)
    */
    .a4g-content { animation: a4g-fade-in 320ms ease-out; }
    @keyframes a4g-fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes a4g-pop {
      0%   { transform: scale(0.6); opacity: 0; }
      60%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    /* Barre noire en bas de l'iPhone (home indicator) */
    .a4g-home-ind {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px; border-radius: 999px;
      background: rgba(26,31,28,0.35); z-index: 100; pointer-events: none;
    }

    /* Étiquette sous le téléphone : numéro + nom de l'écran courant */
    .a4g-label {
      margin-top: 24px; display: inline-flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: #fff; border: 1px solid var(--divider);
      border-radius: 999px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      font-family: 'Inter'; font-size: 12.5px;
    }
    .a4g-label-num {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--mute); background: var(--divider);
      padding: 2px 6px; border-radius: 6px; letter-spacing: 0.5px;
    }
    .a4g-label-text  { font-weight: 600; color: var(--ink); letter-spacing: -0.2px; }
    .a4g-label-journey {
      color: var(--mute); font-size: 11px;
      padding-left: 8px; border-left: 1px solid var(--divider); margin-left: 2px;
    }

    /*
      ── Boutons de navigation gauche/droite ─────────────────────
      Flèches circulaires de chaque côté du téléphone.
      Désactivés (grisés) au premier et dernier écran.
    */
    .a4g-navbtn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 999px;
      background: #fff; border: 1px solid var(--divider); color: var(--ink);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 200ms ease;
      box-shadow: 0 4px 12px rgba(26,31,28,0.08);
    }
    .a4g-navbtn:hover:not(:disabled) { transform: translateY(-50%) scale(1.05); border-color: var(--ink); }
    .a4g-navbtn:disabled { opacity: 0.35; cursor: not-allowed; }
    .a4g-navbtn.left  { left: -64px; }
    .a4g-navbtn.right { right: -64px; }

    /*
      ── Points de navigation (dots) ─────────────────────────────
      9 points en bas = 9 écrans.
      Point actif : plus large + coloré selon le parcours.
      Vert = Bénévole / Orange = Association
    */
    .a4g-dots {
      display: inline-flex; gap: 6px; padding: 10px 14px; background: #fff;
      border: 1px solid var(--divider); border-radius: 999px; margin-top: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .a4g-dot {
      position: relative; width: 22px; height: 8px;
      border-radius: 999px; background: var(--divider-strong);
      border: none; padding: 0; cursor: pointer;
      transition: all 240ms cubic-bezier(.2,.8,.2,1);
    }
    .a4g-dot.on           { background: var(--ink); width: 40px; }
    .a4g-dot.volunteer.on { background: var(--primary); } /* Vert bénévole */
    .a4g-dot.asso.on      { background: var(--accent);  } /* Orange asso */
    /* Infobulle au survol : nom de l'écran */
    .a4g-dot-tip {
      position: absolute; bottom: 100%; left: 50%;
      transform: translateX(-50%) translateY(-6px);
      padding: 6px 10px; background: var(--ink); color: #fff;
      border-radius: 8px; font-size: 11px; font-family: 'Inter';
      font-weight: 500; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 160ms ease;
    }
    .a4g-dot:hover .a4g-dot-tip { opacity: 1; }

    /* Micro-animation au survol des cartes de mission */
    .a4g-card:hover  { transform: translateY(-1px); }
    .a4g-card:active { transform: translateY(0); }

    .twk-panel { font-family: 'Inter', system-ui !important; }
    @keyframes chatDot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    .a4g-phone *::-webkit-scrollbar { display: none; }
    .a4g-phone * { scrollbar-width: none; }

    /* Responsive : boutons en bas sur petit écran */
    @media (max-width: 540px) {
      .a4g-phone-wrap { padding: 0; }
      .a4g-navbtn { width: 36px; height: 36px; }
      .a4g-navbtn.left  { left: 4px;  top: auto; bottom: -56px; transform: none; }
      .a4g-navbtn.right { right: 4px; top: auto; bottom: -56px; transform: none; }
    }
  </style>
</head>
